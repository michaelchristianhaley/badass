name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Self-test validator
        run: python3 scripts/validate_repository.py --self-test

      - name: Self-test session gate
        run: python3 scripts/session_gate.py --self-test

      - name: Exercise session gate
        run: |
          python3 scripts/session_gate.py --start
          python3 scripts/session_gate.py --check

      - name: Validate repository
        run: python3 scripts/validate_repository.py --check
