name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Self-test validator
        run: python3 scripts/validate_repository.py --self-test

      - name: Validate repository
        run: python3 scripts/validate_repository.py --check
